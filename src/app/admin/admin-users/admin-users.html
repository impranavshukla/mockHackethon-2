<div class="users-container">
  <h2 class="page-title">👥 User Management</h2>

  <!-- Search Bar -->
  <div class="search-bar">
    <input type="text" placeholder="🔍 Search by name, email, phone or role..."
      [ngModel]="searchQuery()" (ngModelChange)="onSearch($event)" />
  </div>

  <!-- Users Table -->
  <div class="table-wrapper">
    <table class="users-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of filteredUsers()">
          <td>{{ user.name }}</td>
          <td>{{ user.email }}</td>
          <td>{{ user.phone }}</td>
          <td>
            <span class="role-tag" [class.admin]="user.role === 'Admin'">{{ user.role }}</span>
          </td>
          <td>
            <button class="btn btn-edit" (click)="openEdit(user)">✏️ Edit</button>
            <button class="btn btn-delete" (click)="deleteUser(user.id)" *ngIf="user.role !== 'Admin'">🗑️ Delete</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Edit Section -->
  <div class="edit-section" *ngIf="editUser.id">
    <h3>📝 Edit User</h3>
    <div class="edit-form">
      <div class="form-group">
        <label>Name</label>
        <input type="text" [(ngModel)]="editUser.name" placeholder="Name" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="editUser.email" placeholder="Email" />
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" [(ngModel)]="editUser.phone" placeholder="Phone" />
      </div>
      <div class="form-group">
        <label>Role</label>
        <select [(ngModel)]="editUser.role">
          <option value="User">User</option>
          <option value="Admin">Admin</option>
        </select>
      </div>
      <div class="form-actions">
        <button class="btn btn-save" (click)="updateUser()">✅ Update</button>
        <button class="btn btn-cancel" (click)="editUser = {}">❌ Cancel</button>
      </div>
    </div>
  </div>
</div>
